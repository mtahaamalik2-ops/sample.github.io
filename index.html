  <title>Happy Birthday</title>

    body {

      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: white;
      text-align: center;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      margin-bottom: 10px;
    }

    p {

      border: none;
      border-radius: 25px;
      cursor: pointer;

      color: #ff4b5c;
      transition: 0.3s;
