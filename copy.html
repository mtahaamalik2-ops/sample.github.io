<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candle Blow Demo v2</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    height:100%;
    background:#020203;
    overflow:hidden;
    font-family:'Georgia', serif;
    cursor:pointer;
    user-select:none;
  }

  /* ============ BACKGROUND LAYERS ============ */
  #bg-dark{
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse 900px 700px at 50% 78%, rgba(40,25,8,0.55), transparent 60%),
      linear-gradient(180deg, #03030a 0%, #050608 45%, #020203 100%);
    z-index:0;
  }

  /* the ambient candlelight glow cast on the wall/background, flickers independently */
  #ambient-glow{
    position:fixed;
    bottom:0; left:50%;
    width:1100px; height:700px;
    transform:translateX(-50%);
    background:radial-gradient(ellipse 50% 60% at 50% 100%, rgba(255,170,70,0.20) 0%, rgba(255,130,40,0.10) 35%, transparent 70%);
    z-index:1;
    animation:ambientFlicker 2.2s ease-in-out infinite;
    mix-blend-mode:screen;
  }

  @keyframes ambientFlicker{
    0%{ opacity:0.75; transform:translateX(-50%) scale(1); }
    15%{ opacity:0.95; transform:translateX(-49%) scale(1.03); }
    30%{ opacity:0.65; transform:translateX(-51%) scale(0.98); }
    45%{ opacity:1; transform:translateX(-50%) scale(1.05); }
    60%{ opacity:0.7; transform:translateX(-50%) scale(0.99); }
    75%{ opacity:0.9; transform:translateX(-49.5%) scale(1.02); }
    100%{ opacity:0.75; transform:translateX(-50%) scale(1); }
  }

  /* dust motes / sparkles floating in the lit air */
  .mote{
    position:fixed;
    border-radius:50%;
    background:rgba(255,210,140,0.8);
    box-shadow:0 0 6px 1px rgba(255,180,90,0.6);
    z-index:2;
    animation:moteFloat ease-in-out infinite;
    opacity:0;
  }
  @keyframes moteFloat{
    0%{ opacity:0; transform:translateY(0) translateX(0); }
    15%{ opacity:0.9; }
    50%{ transform:translateY(-40px) translateX(8px); }
    85%{ opacity:0.6; }
    100%{ opacity:0; transform:translateY(-90px) translateX(-6px); }
  }

  /* ambient party poppers / confetti hanging in the background, slow ambient drift */
  .bg-confetti{
    position:fixed;
    z-index:1;
    opacity:0.55;
    animation:confettiDrift ease-in-out infinite;
    filter:blur(0.2px);
  }
  @keyframes confettiDrift{
    0%{ transform:translateY(0) rotate(0deg); }
    50%{ transform:translateY(-22px) rotate(180deg); }
    100%{ transform:translateY(0) rotate(360deg); }
  }

  .vignette{
    position:fixed; inset:0;
    background:radial-gradient(ellipse 70% 70% at 50% 55%, transparent 40%, rgba(0,0,0,0.65) 100%);
    z-index:3;
    pointer-events:none;
  }

  /* ============ SCENE / CANDLES ============ */
  #scene{
    position:fixed; inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:5;
    padding-top:140px;
    transition:opacity 1.1s ease, filter 1.1s ease;
  }

  #scene.scene-fade-out{
    opacity:0;
    filter:blur(8px);
  }

  @media (max-width:640px){
    #scene{ padding-top:90px; }
  }

  .cake-row{
    display:flex;
    gap:46px;
    align-items:flex-end;
    position:relative;
    flex-wrap:wrap;
    justify-content:center;
  }

  /* soft floor reflection under candles */
  .floor-glow{
    position:absolute;
    bottom:-22px; left:50%;
    width:480px; height:46px;
    transform:translateX(-50%);
    background:radial-gradient(ellipse, rgba(255,160,70,0.35), transparent 75%);
    filter:blur(5px);
    z-index:-1;
    animation:ambientFlicker 2.2s ease-in-out infinite;
  }

  .candle{
    position:relative;
    width:22px;
    height:144px;
    background:linear-gradient(180deg, #fff6e0, #f4e0b8);
    border-radius:6px 6px 3px 3px;
    box-shadow:inset -3px 0 6px rgba(0,0,0,0.15), 0 6px 16px rgba(0,0,0,0.4);
  }

  .candle::before{
    content:'';
    position:absolute; inset:0;
    background:repeating-linear-gradient(180deg, transparent 0px, transparent 16px, rgba(200,80,80,0.35) 16px, rgba(200,80,80,0.35) 21px);
    border-radius:6px 6px 3px 3px;
  }

  .wick{
    position:absolute;
    top:-16px; left:50%;
    width:3px; height:16px;
    background:#3a2c20;
    transform:translateX(-50%);
  }

  .flame-wrap{
    position:absolute;
    top:-74px;
    left:50%;
    transform:translateX(-50%);
    width:42px;
    height:68px;
    pointer-events:none;
  }

  .glow{
    position:absolute;
    top:50%; left:50%;
    width:125px; height:125px;
    background:radial-gradient(circle, rgba(255,200,90,0.6), rgba(255,150,40,0.18) 50%, transparent 75%);
    transform:translate(-50%,-50%);
    border-radius:50%;
    animation:glowPulse 1.6s ease-in-out infinite;
    filter:blur(3px);
  }

  @keyframes glowPulse{
    0%,100%{transform:translate(-50%,-50%) scale(1); opacity:0.85;}
    50%{transform:translate(-50%,-50%) scale(1.2); opacity:1;}
  }

  .flame{
    position:absolute;
    bottom:0; left:50%;
    width:26px;
    height:52px;
    transform:translateX(-50%);
    background:radial-gradient(ellipse at 50% 70%, #fff7d6 0%, #ffd25c 35%, #ff9d2e 65%, #ff6a1f 100%);
    border-radius:50% 50% 50% 50% / 65% 65% 35% 35%;
    box-shadow:0 0 28px 6px rgba(255,160,40,0.6);
    animation:dance 0.5s ease-in-out infinite alternate;
    transform-origin:bottom center;
  }

  .flame::after{
    content:'';
    position:absolute;
    bottom:3px; left:50%;
    width:10px; height:22px;
    transform:translateX(-50%);
    background:radial-gradient(ellipse at 50% 80%, #4a7dff 0%, #2e4fd1 60%, transparent 100%);
    border-radius:50%;
    opacity:0.6;
  }

  @keyframes dance{
    0%{ transform:translateX(-50%) rotate(-3deg) scaleY(1); }
    30%{ transform:translateX(-48%) rotate(2deg) scaleY(1.05); }
    60%{ transform:translateX(-52%) rotate(-2deg) scaleY(0.96); }
    100%{ transform:translateX(-50%) rotate(3deg) scaleY(1.02); }
  }

  .candle:nth-child(2) .flame{ animation-duration:0.62s; }
  .candle:nth-child(3) .flame{ animation-duration:0.45s; }
  .candle:nth-child(4) .flame{ animation-duration:0.55s; }
  .candle:nth-child(5) .flame{ animation-duration:0.4s; }
  .candle:nth-child(1) .glow{ animation-duration:1.8s; }
  .candle:nth-child(3) .glow{ animation-duration:1.4s; }
  .candle:nth-child(4) .glow{ animation-duration:2s; }
  .candle:nth-child(5) .glow{ animation-duration:1.6s; }

  .smoke{
    position:absolute;
    bottom:48px; left:50%;
    width:16px; height:16px;
    background:rgba(220,220,220,0.5);
    border-radius:50%;
    transform:translateX(-50%);
    opacity:0;
    filter:blur(4px);
  }

  .blown .flame{
    animation:none !important;
    opacity:0;
    transition:opacity 0.25s ease, transform 0.3s ease;
    transform:translateX(-50%) scaleY(0.1);
  }
  .blown .glow{
    animation:none !important;
    opacity:0;
    transition:opacity 0.35s ease;
  }
  .blown .smoke{
    animation:smokeRise 1.4s ease-out forwards;
  }

  @keyframes smokeRise{
    0%{ opacity:0.7; transform:translateX(-50%) translateY(0) scale(1); }
    100%{ opacity:0; transform:translateX(-50%) translateY(-90px) scale(2.4); }
  }

  .prompt{
    margin-top:56px;
    color:#f4e3c1;
    font-size:1.05rem;
    letter-spacing:0.03em;
    opacity:0.85;
    animation:pulseText 2.4s ease-in-out infinite;
    text-align:center;
  }

  @keyframes pulseText{
    0%,100%{opacity:0.55;}
    50%{opacity:1;}
  }

  #nextPage{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:#0a0e27;
    color:#f4c560;
    font-size:2rem;
    opacity:0;
    pointer-events:none;
    transition:opacity 1.1s ease;
    z-index:10;
  }
  #nextPage.show{ opacity:1; pointer-events:all; }

  #pageFade{
    position:fixed; inset:0;
    background:#000;
    opacity:0;
    pointer-events:none;
    z-index:20;
    transition:opacity 1.1s ease;
  }
  #pageFade.show{ opacity:1; }

  #popper-canvas{
    position:fixed; inset:0;
    z-index:15;
    pointer-events:none;
  }

  /* ============ STRING LIGHTS ARC (realistic Edison bulbs) ============ */
  .lights-wrap{
    position:fixed; top:0; left:0; width:100%; z-index:6; pointer-events:none;
    line-height:0;
  }
  .lights-wrap svg{ display:block; width:100%; height:auto; }

  .wire-sway{
    animation:sway 7s ease-in-out infinite;
    transform-origin:top center;
  }
  @keyframes sway{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(5px); }
  }

  .bulb-glow{
    animation:bulbGlow 2.8s ease-in-out infinite;
  }
  @keyframes bulbGlow{
    0%,100%{ opacity:0.55; }
    50%{ opacity:1; }
  }
  .bulb-body{
    animation:bulbBrighten 2.8s ease-in-out infinite;
  }
  @keyframes bulbBrighten{
    0%,100%{ filter:brightness(0.85); }
    50%{ filter:brightness(1.2); }
  }
  .lights-wrap.dimmed{
    transition:opacity 0.9s ease;
    opacity:0.3;
  }
  .lights-wrap-back{
    position:fixed; top:0; left:0; width:100%; z-index:5; pointer-events:none;
    line-height:0;
  }
  .lights-wrap-back svg{ display:block; width:100%; height:auto; }
  .lights-wrap-back.dimmed{
    transition:opacity 0.9s ease;
    opacity:0.3;
  }
  .wire-sway-2{
    animation:sway 7s ease-in-out infinite;
    animation-delay:-2s;
    transform-origin:top center;
  }
  .edison-glow{
    animation:edisonGlow 2.6s ease-in-out infinite;
  }
  @keyframes edisonGlow{
    0%,100%{ opacity:0.5; }
    50%{ opacity:1; }
  }
  .edison-body{
    animation:edisonBrighten 2.6s ease-in-out infinite;
  }
  @keyframes edisonBrighten{
    0%,100%{ filter:brightness(0.82); }
    50%{ filter:brightness(1.15); }
  }
  .sparkle{
    animation:sparkleTwinkle ease-in-out infinite;
    transform-origin:center;
  }
  @keyframes sparkleTwinkle{
    0%,100%{ opacity:0; transform:scale(0.4); }
    50%{ opacity:1; transform:scale(1); }
  }
</style>
</head>
<body>

<div id="bg-dark"></div>
<div id="ambient-glow"></div>
<div class="vignette"></div>

<!-- back layer: Edison teardrop bulbs on tangled wires with sparkles -->
<div class="lights-wrap-back" id="stringLightsBack" aria-hidden="true">
  <svg viewBox="0 0 1200 230" preserveAspectRatio="none">
    <defs>
      <radialGradient id="haloGradEdison" cx="50%" cy="40%" r="60%">
        <stop offset="0%" stop-color="#ffe9b0" stop-opacity="0.9"/>
        <stop offset="40%" stop-color="#ffc861" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="#ffc861" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="bulbGradEdison" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#fff6d8"/>
        <stop offset="55%" stop-color="#ffd874"/>
        <stop offset="100%" stop-color="#f5a93c"/>
      </linearGradient>

      <!-- reusable teardrop Edison bulb -->
      <g id="edisonBulb">
        <circle cx="0" cy="14" r="30" fill="url(#haloGradEdison)"/>
        <rect x="-4.5" y="-9" width="9" height="6" rx="1.5" fill="#2a2a2a"/>
        <path d="M -8,-3 C -8,9 -8,17 0,26 C 8,17 8,9 8,-3 C 8,-7 -8,-7 -8,-3 Z"
              fill="url(#bulbGradEdison)" class="edison-body"/>
        <ellipse cx="-2.5" cy="6" rx="2" ry="6" fill="#fff8e3" opacity="0.65"/>
      </g>
    </defs>

    <!-- two slightly offset, tangled wires -->
    <path class="wire-sway"   d="M -10,5  C 150,95 280,30 420,75 C 560,115 680,40 820,80 C 960,115 1080,45 1210,15"
      fill="none" stroke="#1c1c1c" stroke-width="2.2" opacity="0.7"/>
    <path class="wire-sway-2" d="M -10,25 C 130,55 260,100 400,55 C 540,15 690,95 830,55 C 970,20 1090,90 1210,40"
      fill="none" stroke="#262626" stroke-width="2" opacity="0.55"/>

    <!-- scattered twinkle sparkles between the bulbs -->
    <g fill="#fff6d8">
      <path class="sparkle" style="animation-duration:2.1s; animation-delay:0.2s" d="M120,40 l3,9 l9,3 l-9,3 l-3,9 l-3,-9 l-9,-3 l9,-3 Z"/>
      <path class="sparkle" style="animation-duration:1.8s; animation-delay:1.1s" d="M330,18 l2.5,7 l7,2.5 l-7,2.5 l-2.5,7 l-2.5,-7 l-7,-2.5 l7,-2.5 Z"/>
      <path class="sparkle" style="animation-duration:2.4s; animation-delay:0.6s" d="M610,28 l3,8 l8,3 l-8,3 l-3,8 l-3,-8 l-8,-3 l8,-3 Z"/>
      <path class="sparkle" style="animation-duration:2s;   animation-delay:1.6s" d="M900,18 l2.5,7 l7,2.5 l-7,2.5 l-2.5,7 l-2.5,-7 l-7,-2.5 l7,-2.5 Z"/>
      <path class="sparkle" style="animation-duration:2.3s; animation-delay:0.4s" d="M1080,55 l3,8 l8,3 l-8,3 l-3,8 l-3,-8 l-8,-3 l8,-3 Z"/>
    </g>

    <!-- bulbs hanging at varying depths along the wires -->
    <use href="#edisonBulb" x="30"   y="60"  class="edison-glow" style="animation-delay:0s"/>
    <use href="#edisonBulb" x="160"  y="110" class="edison-glow" style="animation-delay:0.35s"/>
    <use href="#edisonBulb" x="270"  y="70"  class="edison-glow" style="animation-delay:0.7s"/>
    <use href="#edisonBulb" x="380"  y="115" class="edison-glow" style="animation-delay:1.05s"/>
    <use href="#edisonBulb" x="490"  y="150" class="edison-glow" style="animation-delay:1.4s"/>
    <use href="#edisonBulb" x="600"  y="100" class="edison-glow" style="animation-delay:1.75s"/>
    <use href="#edisonBulb" x="710"  y="145" class="edison-glow" style="animation-delay:0.15s"/>
    <use href="#edisonBulb" x="820"  y="95"  class="edison-glow" style="animation-delay:0.5s"/>
    <use href="#edisonBulb" x="930"  y="135" class="edison-glow" style="animation-delay:0.85s"/>
    <use href="#edisonBulb" x="1040" y="80"  class="edison-glow" style="animation-delay:1.2s"/>
    <use href="#edisonBulb" x="1150" y="50"  class="edison-glow" style="animation-delay:1.55s"/>
  </svg>
</div>

<!-- string lights draped across the top: round globe bulbs on a single sagging wire -->
<div class="lights-wrap" id="stringLights" aria-hidden="true">
  <svg viewBox="0 0 1200 240" preserveAspectRatio="none">
    <defs>
      <radialGradient id="haloGrad" cx="50%" cy="45%" r="65%">
        <stop offset="0%" stop-color="#ffeec0" stop-opacity="0.95"/>
        <stop offset="35%" stop-color="#ffc861" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#ffc861" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="globeGrad" cx="38%" cy="32%" r="65%">
        <stop offset="0%" stop-color="#fffaf0"/>
        <stop offset="45%" stop-color="#ffe9b0"/>
        <stop offset="100%" stop-color="#f4b942"/>
      </radialGradient>

      <!-- reusable round globe bulb with cap and glow halo -->
      <g id="globeBulb">
        <circle cx="0" cy="14" r="26" fill="url(#haloGrad)"/>
        <rect x="-4" y="-6" width="8" height="7" rx="1" fill="#d8a23a"/>
        <circle cx="0" cy="13" r="11" fill="url(#globeGrad)" class="bulb-body"/>
        <circle cx="-3.5" cy="9" r="3" fill="#fffdf6" opacity="0.7"/>
      </g>

      <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="1.4"/>
      </filter>
    </defs>

    <!-- single wire, one smooth sag -->
    <path class="wire-sway" d="M -10,12 C 280,250 920,250 1210,12"
      fill="none" stroke="#caa86a" stroke-width="2" opacity="0.55"/>

    <!-- bulbs along the curve: brighter/larger near bottom of sag, softer + blurred near the ends for depth -->
    <use href="#globeBulb" x="20"   y="22"  transform="scale(0.7)"  style="animation-delay:0s"    filter="url(#softBlur)" opacity="0.7" class="bulb-glow"/>
    <use href="#globeBulb" x="135"  y="70"  transform="scale(0.85)" style="animation-delay:0.3s"  class="bulb-glow"/>
    <use href="#globeBulb" x="255"  y="120" transform="scale(1)"    style="animation-delay:0.6s"  class="bulb-glow"/>
    <use href="#globeBulb" x="375"  y="158" transform="scale(1.05)" style="animation-delay:0.9s"  class="bulb-glow"/>
    <use href="#globeBulb" x="495"  y="182" transform="scale(1.1)"  style="animation-delay:1.2s"  class="bulb-glow"/>
    <use href="#globeBulb" x="600"  y="192" transform="scale(1.1)"  style="animation-delay:1.5s"  class="bulb-glow"/>
    <use href="#globeBulb" x="705"  y="182" transform="scale(1.1)"  style="animation-delay:1.8s"  class="bulb-glow"/>
    <use href="#globeBulb" x="825"  y="158" transform="scale(1.05)" style="animation-delay:0.15s" class="bulb-glow"/>
    <use href="#globeBulb" x="945"  y="120" transform="scale(1)"    style="animation-delay:0.45s" class="bulb-glow"/>
    <use href="#globeBulb" x="1065" y="70"  transform="scale(0.85)" style="animation-delay:0.75s" class="bulb-glow"/>
    <use href="#globeBulb" x="1180" y="22"  transform="scale(0.7)"  style="animation-delay:1.05s" filter="url(#softBlur)" opacity="0.7" class="bulb-glow"/>
  </svg>
</div>

<div id="scene">
  <div class="cake-row">
    <div class="floor-glow"></div>
    <div class="candle">
      <div class="wick"></div>
      <div class="flame-wrap">
        <div class="glow"></div>
        <div class="flame"></div>
        <div class="smoke"></div>
      </div>
    </div>
    <div class="candle">
      <div class="wick"></div>
      <div class="flame-wrap">
        <div class="glow"></div>

        <div class="smoke"></div>
      </div>
    </div>
    <div class="candle">
      <div class="wick"></div>
      <div class="flame-wrap">
        <div class="glow"></div>

    <div class="candle">

<!-- ============ POPPER SOUND ============ -->
<!-- Replace the src below with your own sound file's path/filename.
     Example: <source src="popper-sound.mp3" type="audio/mpeg">
     Place the audio file in the same folder as this HTML file (or update the path),
     then it will play automatically instead of the built-in synthesized sound. -->
<audio id="popperSound" preload="auto">
  <source src="popper-sound.mp3" type="audio/mpeg">
</audio>

<script>
  // ===== ambient floating dust motes near the candlelight =====
  (function(){
    const count = window.innerWidth < 640 ? 10 : 18;
    for(let i=0;i<count;i++){
      const m = document.createElement('div');
      m.className = 'mote';
      const size = Math.random()*3+1.5;
      m.style.width = size+'px';
      m.style.height = size+'px';
      m.style.left = (50 + (Math.random()*36-18)) + '%';
      m.style.bottom = (Math.random()*220+40) + 'px';
      m.style.animationDuration = (Math.random()*4+3)+'s';
      m.style.animationDelay = (Math.random()*5)+'s';
      document.body.appendChild(m);
    }
  })();

  // ===== ambient background party poppers / confetti (decorative, slow drift) =====
  (function(){
    const shapes = ['🎊','✨','🎉'];
    const count = window.innerWidth < 640 ? 6 : 12;
    for(let i=0;i<count;i++){
      const c = document.createElement('div');
      c.className = 'bg-confetti';
      c.textContent = shapes[Math.floor(Math.random()*shapes.length)];
      c.style.left = Math.random()*100 + '%';
      c.style.top = Math.random()*70 + '%';
      c.style.fontSize = (Math.random()*14+12)+'px';
      c.style.animationDuration = (Math.random()*5+4)+'s';
      c.style.animationDelay = (Math.random()*4)+'s';
      document.body.appendChild(c);
    }
  })();

  // ===== party popper: synthesized pop+crackle sound =====
  let audioCtx = null;
  function playPopSound(delay){
    try{
      if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      const now = audioCtx.currentTime + delay;

      // the "pop" — a short, sharp pitch-drop tone
      const osc = audioCtx.createOscillator();
      const oscGain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(900, now);
      osc.frequency.exponentialRampToValueAtTime(120, now + 0.09);
      oscGain.gain.setValueAtTime(0.5, now);
      oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      osc.connect(oscGain);
      oscGain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + 0.13);

      // the "crackle/confetti hiss" — short burst of filtered noise
      const bufferSize = audioCtx.sampleRate * 0.35;
      const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = noiseBuffer.getChannelData(0);
      for(let i=0;i<bufferSize;i++){
        data[i] = (Math.random()*2-1) * Math.pow(1 - i/bufferSize, 2);
      }
      const noise = audioCtx.createBufferSource();
      noise.buffer = noiseBuffer;
      const noiseFilter = audioCtx.createBiquadFilter();
      noiseFilter.type = 'highpass';
      noiseFilter.frequency.value = 1800;
      const noiseGain = audioCtx.createGain();
      noiseGain.gain.setValueAtTime(0.35, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(audioCtx.destination);
      noise.start(now);
    }catch(e){ /* audio not available, fail silently */ }
  }

  // ===== party popper: visual confetti/streamer burst =====
  function burstPoppers(){
    const canvas = document.getElementById('popper-canvas');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const ctx = canvas.getContext('2d');
    const colors = ['#f4c560','#f4a89c','#9fd8d0','#e8e9f3','#ffd9d0','#caa86a'];

    // three popper origins: bottom-left, bottom-right, and bottom-center, all shooting upward/outward
    const origins = [
      { x: canvas.width*0.10, y: canvas.height*0.95, dir: 1 },
      { x: canvas.width*0.90, y: canvas.height*0.95, dir: -1 },
      { x: canvas.width*0.50, y: canvas.height*0.98, dir: 0 }
    ];

    let particles = [];
    origins.forEach(o=>{
      const count = window.innerWidth < 640 ? 70 : 120;
      for(let i=0;i<count;i++){
        const baseAngle = o.dir === 0 ? -Math.PI/2 : (-Math.PI/2);
        const spread = o.dir === 0 ? (Math.random()*1.6 - 0.8) : (o.dir * (Math.random()*0.9 - 0.1));
        const angle = baseAngle + spread;
        const speed = Math.random()*15 + 9;
        particles.push({
          x:o.x, y:o.y,
          vx: Math.cos(angle)*speed*(o.dir === 0 ? 1 : o.dir*-1) + (Math.random()-0.5)*2,
          vy: Math.sin(angle)*speed - Math.random()*4,
          size: Math.random()*11+7,
          color: colors[Math.floor(Math.random()*colors.length)],
          rot: Math.random()*360,
          vr: (Math.random()-0.5)*16,
          shape: Math.random() < 0.5 ? 'rect' : 'streamer'
        });
      }
    });

    let frame=0;
    const maxFrames=170;
    function tick(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      particles.forEach(p=>{
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.24;
        p.vx *= 0.994;
        p.rot += p.vr;
        ctx.save();
        ctx.translate(p.x,p.y);
        ctx.rotate(p.rot*Math.PI/180);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = Math.max(0, 1 - frame/maxFrames);
        if(p.shape === 'rect'){
          ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.55);
        } else {
          ctx.fillRect(-p.size/5, -p.size*1.3, p.size*0.4, p.size*1.3);
        }
        ctx.restore();
      });
      frame++;
      if(frame<maxFrames){
        requestAnimationFrame(tick);
      } else {
        ctx.clearRect(0,0,canvas.width,canvas.height);
      }
    }
    tick();
  }

  function poppersWithSound(){
    const userAudio = document.getElementById('popperSound');
    let usedFallback = false;

    function playFallback(){
      if(usedFallback) return;
      usedFallback = true;
      playPopSound(0);
      playPopSound(0.06);
    }

    if(userAudio && userAudio.querySelector('source').getAttribute('src')){
      userAudio.currentTime = 0;
      const playPromise = userAudio.play();
      if(playPromise && playPromise.catch){
        playPromise.catch(playFallback);
      }
      // if the file path is wrong/missing, the browser fires an 'error' event
      userAudio.onerror = playFallback;
    } else {
      playFallback();
    }

    burstPoppers();
  }

  // ===== click to blow out candles, then lights, then fade page =====
  const scene = document.getElementById('scene');
  const nextPage = document.getElementById('nextPage');
  const pageFade = document.getElementById('pageFade');
  const ambientGlow = document.getElementById('ambient-glow');
  const lightsFront = document.getElementById('stringLights');
  const lightsBack = document.getElementById('stringLightsBack');
  let blown = false;

  document.addEventListener('click', function(){
    if(blown) return;
    blown = true;

    // create/resume the audio context synchronously on the click gesture itself,
    // so browsers don't block the later scheduled popper sound
    try{
      if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if(audioCtx.state === 'suspended'){
        audioCtx.resume();
      }
    }catch(e){ /* audio not available, fail silently */ }

    // STAGE 1 — blow out the candles (flames die out + smoke rises)
    scene.classList.add('blown');

    // STAGE 2 — party poppers pop with sound, right after the candles are out
    setTimeout(()=>{
      poppersWithSound();
    }, 1300);

    // STAGE 3 — after the poppers have popped, turn off the string lights + ambient glow
    setTimeout(()=>{
      ambientGlow.style.transition = 'opacity 0.9s ease';
      ambientGlow.style.opacity = '0';
      ambientGlow.style.animation = 'none';
      lightsFront.classList.add('dimmed');
      lightsBack.classList.add('dimmed');
    }, 2600);

    // STAGE 4 — once lights are off, fade the whole scene + page to black
    setTimeout(()=>{
      scene.classList.add('scene-fade-out');
      pageFade.classList.add('show');
    }, 3600);

    // STAGE 5 — reveal next content once faded out
    setTimeout(()=>{
      scene.style.display = 'none';
      nextPage.classList.add('show');
    }, 4750);
  });
</script>
