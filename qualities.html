<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Her Beautiful Qualities</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#fff3e6;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
padding:30px;
}

h1{
color:#ff4d6d;
margin-bottom:30px;
font-size:3rem;
}

.cake{
position:relative;
width:200px;
height:200px;
margin-bottom:40px;
animation:bounce 2s infinite;
}

.layer1{
position:absolute;
bottom:0;
width:200px;
height:60px;
background:#ff7b7b;
border-radius:10px;
}

.layer2{
position:absolute;
bottom:60px;
left:20px;
width:160px;
height:50px;
background:#ffb3c1;
border-radius:10px;
}

.layer3{
position:absolute;
bottom:110px;
left:40px;
width:120px;
height:40px;
background:#ffd6a5;
border-radius:10px;
}

.candle{
position:absolute;
bottom:150px;
left:95px;
width:10px;
height:40px;
background:white;
}

.flame{
position:absolute;
bottom:190px;
left:88px;
width:24px;
height:24px;
background:orange;
border-radius:50%;
animation:flicker 0.5s infinite alternate;
}

@keyframes flicker{
from{
transform:scale(1);
}
to{
transform:scale(1.2);
}
}

@keyframes bounce{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-15px);
}
}

.box{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
max-width:600px;
}

ul{
font-size:20px;
line-height:2;
color:#444;
}

a{
margin-top:30px;
text-decoration:none;
color:#ff4d6d;
font-weight:bold;
}
</style>
</head>

<body>

<h1>✨ What Makes You Special ✨</h1>

<div class="cake">
<div class="layer1"></div>
<div class="layer2"></div>
<div class="layer3"></div>
<div class="candle"></div>
<div class="flame"></div>
</div>

<div class="box">
<ul>
<li>💖 Kind and Caring</li>
<li>🌸 Beautiful Inside and Out</li>
<li>😊 Always Brings Positive Energy</li>
<li>✨ Inspires Others Around Her</li>
<li>🌟 Strong and Confident</li>
<li>🎀 Has a Wonderful Heart</li>
<li>💫 Makes Every Moment Better</li>
</ul>
</div>

<a href="index.html">⬅ Back</a>

</body>
</html>
